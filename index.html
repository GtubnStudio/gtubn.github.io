<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gtubn Studio 的网站</title>
    <style>
        :root {
            --bg: #0d1117; --panel: #161b22; --border: #21262d;
            --text: #c9d1d9; --muted: #8b949e; --accent: #58a6ff;
        }
        [data-theme="light"] {
            --bg: #f6f8fa; --panel: #ffffff; --border: #d0d7de;
            --text: #24292f; --muted: #57606a; --accent: #0969da;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, sans-serif;
            background: var(--bg); color: var(--text);
            max-width: 800px; margin: 0 auto; padding: 40px 20px;
            transition: background 0.2s;
        }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        h1 { font-size: 20px; font-weight: 600; }
        .nav { display: flex; gap: 16px; margin-bottom: 36px; font-size: 14px; }
        .nav a { color: var(--muted); text-decoration: none; cursor: pointer; }
        .nav a.active { color: var(--accent); font-weight: 500; }
        
        .page { display: none; }
        .page.active { display: block; }

        /* Share */
        .empty-state { display: flex; flex-direction: column; align-items: center; padding: 60px 0; }
        .anim-box { position: relative; width: 80px; height: 80px; margin-bottom: 20px; }
        .pulse {
            position: absolute; width: 100%; height: 100%;
            border: 2px solid var(--accent); border-radius: 50%;
            animation: wave 2.5s infinite ease-out; opacity: 0;
        }
        .pulse2 { animation-delay: 1.25s; }
        .center-icon {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 40px; height: 40px; color: var(--muted); animation: float 4s infinite ease-in-out;
        }
        .empty-state p { font-size: 14px; color: var(--muted); }
        
        /* 关于 */
        .about-content { line-height: 1.8; font-size: 14px; }
        .about-content p { margin-bottom: 12px; }
        .about-content span { color: var(--muted); display: inline-block; width: 80px; }

        button {
            background: var(--panel); border: 1px solid var(--border);
            padding: 6px 12px; border-radius: 6px; color: var(--text); cursor: pointer; font-size: 13px;
        }
        @keyframes wave {
            0% { transform: scale(0.4); opacity: 0; }
            30% { opacity: 0.3; }
            100% { transform: scale(1.3); opacity: 0; }
        }
        @keyframes float {
            0%, 100% { transform: translate(-50%, -52%); }
            50% { transform: translate(-50%, -48%); }
        }
    </style>
</head>
<body>

    <header>
        <h1>Gtubn Studio 的网站</h1>
        <button id="tog">Light Mode</button>
    </header>

    <div class="nav">
        <a id="nav-share" class="active">Share</a>
        <a id="nav-about">关于</a>
    </div>

    <!-- Share 页 -->
    <div id="page-share" class="page active">
        <div class="empty-state">
            <div class="anim-box">
                <div class="pulse"></div>
                <div class="pulse2"></div>
                <svg class="center-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                </svg>
            </div>
            <p>暂无共享文件</p>
        </div>
    </div>

    <!-- 关于 页 -->
    <div id="page-about" class="page">
        <div class="about-content">
            <p><strong>Gtubn Studio</strong> 是一个专注于数字化效率与极简技术实现的组织。</p>
            <p><span>支持</span>GitHub Pages</p>
        </div>
    </div>

    <script>
        const btnShare = document.getElementById('nav-share');
        const btnAbout = document.getElementById('nav-about');
        const pgShare = document.getElementById('page-share');
        const pgAbout = document.getElementById('page-about');

        btnShare.addEventListener('click', () => {
            btnShare.className = 'active'; btnAbout.className = '';
            pgShare.className = 'page active'; pgAbout.className = 'page';
        });
        btnAbout.addEventListener('click', () => {
            btnAbout.className = 'active'; btnShare.className = '';
            pgAbout.className = 'page active'; pgShare.className = 'page';
        });

        document.getElementById('tog').addEventListener('click', e => {
            let l = document.body.getAttribute('data-theme') === 'light';
            if (l) { document.body.removeAttribute('data-theme'); e.target.textContent = 'Light Mode'; }
            else { document.body.setAttribute('data-theme', 'light'); e.target.textContent = 'Dark Mode'; }
        });
    </script>
</body>
</html>
